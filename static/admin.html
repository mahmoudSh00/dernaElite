<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Derna Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Derna Elite</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-12">
        <div id="admin-container"></div>
    </div>

    <script>
        let isLoggedIn = false;

        function handleLogin(event) {
            event.preventDefault();
            isLoggedIn = true;
            renderAdmin();
        }

        function renderAdmin() {
            const container = document.getElementById('admin-container');

            if (!isLoggedIn) {
                container.innerHTML = `
                    <div class="max-w-md mx-auto">
                        <div class="bg-white p-8 rounded-lg shadow">
                            <h1 class="text-2xl font-bold mb-6 text-center">تسجيل دخول المشرف</h1>
                            <form id="login-form" class="space-y-4">
                                <div>
                                    <label class="block font-bold mb-1">البريد الإلكتروني</label>
                                    <input type="email" class="w-full border rounded-lg px-4 py-2">
                                </div>
                                <div>
                                    <label class="block font-bold mb-1">كلمة المرور</label>
                                    <input type="password" class="w-full border rounded-lg px-4 py-2">
                                </div>
                                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
                                    دخول
                                </button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('login-form').addEventListener('submit', handleLogin);
                return;
            }

            container.innerHTML = `
                <h1 class="text-3xl font-bold mb-8">لوحة التحكم</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-bold mb-2">عدد المنتجات</h3>
                        <p class="text-3xl font-bold text-blue-600">8</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-bold mb-2">عدد الطلبات</h3>
                        <p class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-bold mb-2">إجمالي المبيعات</h3>
                        <p class="text-3xl font-bold text-purple-600">$0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="text-xl font-bold mb-4">إدارة المنتجات</h2>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 mb-4">إضافة منتج جديد</button>
                </div>
            `;
        }

        renderAdmin();
    </script>
</body>
</html>
