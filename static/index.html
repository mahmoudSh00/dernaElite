<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derna Elite - متجر درنة للتسوق</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Derna Elite</h1>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="relative bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    سلة التسوق
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-6 h-6 flex items-center justify-center rounded-full hidden">0</span>
                </a>
                <a href="admin.html" class="text-gray-600 hover:text-blue-600">لوحة التحكم</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 class="text-4xl font-bold mb-4">مرحباً بك في متجر درنة</h2>
            <p class="text-xl">أفضل المنتجات بأفضل الأسعار</p>
        </div>
    </div>

    <!-- Products Section -->
    <div class="max-w-7xl mx-auto px-4 py-12">
        <h3 class="text-3xl font-bold mb-8 text-center">المنتجات المميزة</h3>
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        // Sample Products
        const products = [
            { id: "1", name: "سماعات بلوتوث", price: 89, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop", description: "سماعات عالية الجودة", category: "إلكترونيات" },
            { id: "2", name: "ساعة ذكية", price: 199, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop", description: "ساعة ذكية متعددة الميزات", category: "إلكترونيات" },
            { id: "3", name: "حذاء رياضي", price: 120, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop", description: "حذاء مريح للرياضة", category: "أحذية" },
            { id: "4", name: "كأس حرارية", price: 35, image: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400&h=400&fit=crop", description: "كأس تحافظ على درجة الحرارة", category: "منزلية" },
            { id: "5", name: "نظارة شمسية", price: 75, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop", description: "نظارة عصرية", category: "ملابس" },
            { id: "6", name: "حقيبة ظهر", price: 95, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop", description: "حقيبة متعددة الجيوب", category: "حقائب" },
            { id: "7", name: "كاميرا ديجيتال", price: 450, image: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop", description: "كاميرا عالية الدقة", category: "إلكترونيات" },
            { id: "8", name: "مفرح كهربائي", price: 150, image: "https://images.unsplash.com/photo-1580910051075-5947ccb8cee1?w=400&h=400&fit=crop", description: "مفرح فعال ومريح", category: "منزلية" }
        ];

        // Cart from localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Save cart
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        // Update cart count in nav
        function updateCartCount() {
            const countEl = document.getElementById('cart-count');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            countEl.textContent = totalItems;
            countEl.classList.toggle('hidden', totalItems === 0);
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            alert('تم إضافة المنتج إلى السلة!');
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(product => `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                    <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h4 class="font-bold text-lg mb-2">${product.name}</h4>
                        <p class="text-gray-600 text-sm mb-4">${product.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-blue-600">$${product.price}</span>
                            <button onclick="addToCart('${product.id}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">أضف للسلة</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        renderProducts();
        updateCartCount();
    </script>
</body>
</html>
