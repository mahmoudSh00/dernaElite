<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - Derna Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Derna Elite</a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold mb-8">إتمام الطلب</h1>
        <div id="checkout-container"></div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function getTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function handleSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);

            const orderItems = cart.map(item => `${item.name} - ${item.quantity} - $${item.price}`).join('\n');
            const message = `
اسم العميل: ${data.name}
رقم الهاتف: ${data.phone}
المدينة: ${data.city}
العنوان: ${data.address}
ملاحظات: ${data.notes}

المنتجات المطلوبة:
${orderItems}

الإجمالي الكلي: $${getTotal().toFixed(2)}
            `.trim();

            const whatsappUrl = `https://wa.me/218920719250?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            localStorage.removeItem('cart');
            window.location.href = 'index.html';
        }

        function renderCheckout() {
            const container = document.getElementById('checkout-container');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <h2 class="text-2xl text-gray-500 mb-4">السلة فارغة!</h2>
                        <a href="index.html" class="bg-blue-600 text-white px-8 py-3 rounded-lg inline-block hover:bg-blue-700">تسوق الآن</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <form id="checkout-form" class="bg-white p-8 rounded-lg shadow space-y-4">
                    <div>
                        <label class="block font-bold mb-1">الاسم الكامل</label>
                        <input required type="text" name="name" class="w-full border rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">رقم الهاتف</label>
                        <input required type="tel" name="phone" class="w-full border rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">المدينة</label>
                        <input required type="text" name="city" class="w-full border rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">العنوان</label>
                        <textarea required name="address" rows="3" class="w-full border rounded-lg px-4 py-2"></textarea>
                    </div>
                    <div>
                        <label class="block font-bold mb-1">ملاحظات</label>
                        <textarea name="notes" rows="2" class="w-full border rounded-lg px-4 py-2"></textarea>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg mb-2">الإجمالي:</h3>
                        <p class="text-3xl font-bold text-blue-600">$${getTotal().toFixed(2)}</p>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 text-xl font-bold">
                        تأكيد الطلب واتصال بواتساب
                    </button>
                </form>
            `;

            document.getElementById('checkout-form').addEventListener('submit', handleSubmit);
        }

        renderCheckout();
    </script>
</body>
</html>
