<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إتمام الحجز - Derna Elite Shopping">
    <title>إتمام الحجز | Derna Elite Shopping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store"></i>
                Derna Elite Shopping
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">المنتجات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">من نحن</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">اتصل بنا</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-light" data-bs-toggle="darkmode" title="الوضع الداكن">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="cart.html" class="btn btn-outline-light position-relative">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">الرئيسية</a></li>
                <li class="breadcrumb-item"><a href="cart.html">السلة</a></li>
                <li class="breadcrumb-item active" aria-current="page">إتمام الحجز</li>
            </ol>
        </nav>

        <h2 class="mb-5 text-center">
            <i class="fas fa-credit-card ms-2" style="color: var(--accent-color);"></i>
            إتمام الحجز
        </h2>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="checkout-form">
                    <h5 class="mb-4 pb-3 border-bottom">
                        <i class="fas fa-user-circle ms-2"></i>
                        معلومات التوصيل
                    </h5>
                    <form id="checkoutForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="fullName">
                                    <i class="fas fa-user ms-1"></i>
                                    الاسم الكامل
                                </label>
                                <input type="text" class="form-control" id="fullName" required placeholder="أدخل اسمك الكامل">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="phone">
                                    <i class="fas fa-phone ms-1"></i>
                                    رقم الهاتف
                                </label>
                                <input type="tel" class="form-control" id="phone" required placeholder="09xxxxxxxx">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="city">
                                    <i class="fas fa-city ms-1"></i>
                                    المدينة
                                </label>
                                <input type="text" class="form-control" id="city" required placeholder="أدخل اسم المدينة">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="address">
                                    <i class="fas fa-map-marker-alt ms-1"></i>
                                    العنوان التفصيلي
                                </label>
                                <input type="text" class="form-control" id="address" required placeholder="اسم الشارع، رقم المنزل">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="notes">
                                    <i class="fas fa-sticky-note ms-1"></i>
                                    ملاحظات إضافية (اختياري)
                                </label>
                                <textarea class="form-control" id="notes" rows="3" placeholder="أي ملاحظات أخرى تريد إضافتها؟"></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-gold btn-lg w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="fab fa-whatsapp fa-xl"></i>
                                    تأكيد الطلب عبر واتساب
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="cart-summary" style="position: sticky; top: 100px;">
                    <h5 class="mb-4 pb-3 border-bottom">
                        <i class="fas fa-shopping-bag ms-2"></i>
                        ملخص الطلب
                    </h5>
                    <div id="orderSummary"></div>
                    <div id="checkoutTotal"></div>
                    <hr>
                    <div class="d-grid gap-2 mt-4">
                        <a href="cart.html" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-right me-2"></i>
                            العودة للسلة
                        </a>
                        <a href="products.html" class="btn btn-outline-primary">
                            <i class="fas fa-shopping-basket me-2"></i>
                            مواصلة التسوق
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom text-center pt-4">
                <p class="text-white-50 mb-0">© 2025 Derna Elite Shopping. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initCheckout();
        });
    </script>
</body>
</html>
