<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - Derna Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Derna Elite</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold mb-8">سلة التسوق</h1>
        <div id="cart-items" class="space-y-4 mb-8"></div>
        <div id="cart-summary" class="bg-white p-6 rounded-lg shadow"></div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function updateQuantity(productId, newQty) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                if (newQty <= 0) {
                    cart = cart.filter(i => i.id !== productId);
                } else {
                    item.quantity = newQty;
                }
            }
            saveCart();
        }

        function removeItem(productId) {
            cart = cart.filter(i => i.id !== productId);
            saveCart();
        }

        function getTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <h2 class="text-2xl text-gray-500 mb-4">السلة فارغة!</h2>
                        <a href="index.html" class="bg-blue-600 text-white px-8 py-3 rounded-lg inline-block hover:bg-blue-700">تسوق الآن</a>
                    </div>
                `;
                summary.innerHTML = '';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="bg-white p-4 rounded-lg shadow flex gap-4">
                    <img src="${item.image}" alt="${item.name}" class="w-24 h-24 object-cover rounded">
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">${item.name}</h3>
                        <p class="text-blue-600 font-bold">$${item.price}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <button onclick="updateQuantity('${item.id}', ${item.quantity - 1})" class="bg-gray-200 px-3 py-1 rounded">-</button>
                            <span class="font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', ${item.quantity + 1})" class="bg-gray-200 px-3 py-1 rounded">+</button>
                            <button onclick="removeItem('${item.id}')" class="text-red-500 mr-4">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');

            summary.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xl font-bold">الإجمالي:</span>
                    <span class="text-3xl font-bold text-blue-600">$${getTotal().toFixed(2)}</span>
                </div>
                <a href="checkout.html" class="w-full bg-blue-600 text-white py-3 rounded-lg text-center block hover:bg-blue-700 text-xl font-bold">إتمام الطلب</a>
            `;
        }

        renderCart();
    </script>
</body>
</html>
