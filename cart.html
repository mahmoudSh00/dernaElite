<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store"></i>
                Derna Elite Shopping
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">المنتجات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">من نحن</a>
                    </li>
                    <li class="nav-item">

                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-light" data-bs-toggle="darkmode" title="الوضع الداكن">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="cart.html" class="btn btn-outline-light position-relative active">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge">0</span>
                    </a>
                </div>
            </div>

            </ol>

            </div>

                <div class="cart-summary" id="cartSummary">
                    <h5 class="mb-4 pb-3 border-bottom">

                    </h5>
                    <div id="cartSummaryContent"></div>
                </div>
            </div>
